name: OnePlus 10 Pro PixelOS Android 16 Build

on:
  workflow_dispatch: # Isse aap button daba kar jab chahein build shuru kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Free up GitHub Runner Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 openjdk-17-jdk

    - name: Setup Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize PixelOS Source
      run: |
        git config --global user.email "divyanshverma@example.com"
        git config --global user.name "BitDoge126"
        mkdir -p ~/pixelos
        cd ~/pixelos
        echo -e "\n\n" | repo init -u https://github.com/PixelOS-AOSP/manifest.git -b fourteen --depth=1 --no-clone-bundle --no-tags
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone OnePlus 10 Pro Trees (Device, Kernel, Vendor)
      run: |
        cd ~/pixelos
        # 1. Device Tree cloning
        git clone https://github.com/BitDoge126/android_device_oneplus_wly.git -b lineage-23.0 device/oneplus/negroni
        
        # 2. Kernel Tree cloning (Jo aapne abhi fork kiya)
        git clone https://github.com/BitDoge126/android_kernel_oneplus_sm8450.git -b lineage-23.1 kernel/oneplus/sm8450
        
        # 3. Vendor Tree cloning (TheMuppets se automatic proprietary files link)
        git clone https://github.com/TheMuppets/proprietary_vendor_oneplus.git -b lineage-21 vendor/oneplus

    - name: Build Custom ROM
      run: |
        cd ~/pixelos
        source build/envsetup.sh
        lunch pixelos_negroni-userdebug || lunch lineage_negroni-userdebug
        mka bacon -j$(nproc --all)
