name: OnePlus 10 Pro PixelOS Android 16 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Extreme Space Cleanup
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/share/swift /usr/local/share/chromium /usr/local/lib/node_modules /opt/pipx /opt/microsoft /usr/local/share/powershell /usr/share/gradle /usr/share/ant
        docker rmi $(docker images -q) || true
        sudo apt-get clean
        sudo swapoff -a
        sudo rm -f /swapfile
        df -h
        
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 openjdk-17-jdk

    - name: Setup Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Source (Low Storage Mode)
      run: |
        git config --global user.email "divyanshverma@example.com"
        git config --global user.name "BitDoge126"
        mkdir -p ~/pixelos
        cd ~/pixelos
        repo init -u https://github.com/PixelOS-AOSP/manifest.git -b fourteen --depth=1
        # Jobs 1 par set kiya hai taaki disk burst na ho
        repo sync -c -j1 --force-sync --no-clone-bundle --no-tags

    - name: Clone Trees
      run: |
        cd ~/pixelos
        git clone https://github.com/Machad3x/android_device_oneplus_wly.git -b fourteen device/oneplus/wly
        git clone https://github.com/Machad3x/android_device_oneplus_sm8450-common.git -b fourteen device/oneplus/sm8450-common
        git clone https://github.com/Machad3x/android_kernel_oneplus_sm8450.git -b fourteen kernel/oneplus/sm8450
        git clone https://github.com/Machad3x/proprietary_vendor_oneplus_wly.git -b fourteen vendor/oneplus/wly
        git clone https://github.com/Machad3x/proprietary_vendor_oneplus_sm8450-common.git -b fourteen vendor/oneplus/sm8450-common

    - name: Build ROM
      run: |
        cd ~/pixelos
        source build/envsetup.sh
        lunch pixelos_wly-userdebug
        mka bacon -j$(nproc --all)
